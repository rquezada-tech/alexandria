<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="sans-serif">
  <rect width="800" height="440" fill="#fafafa"/>

  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">TIPOS DE REFUGIO DE EMERGENCIA — Selección según contexto</text>

  <!-- Debris Hut -->
  <g transform="translate(50,50)">
    <rect x="-5" y="-5" width="200" height="160" fill="none" stroke="#ccc" stroke-width="1" rx="4"/>
    <text x="95" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">1. Debris Hut (Cobijo de Residuos)</text>
    <!-- Ground -->
    <line x1="10" y1="130" x2="180" y2="130" stroke="#8B6914" stroke-width="2"/>
    <!-- A-frame structure -->
    <line x1="95" y1="20" x2="20" y2="130" stroke="#5a4510" stroke-width="3"/>
    <line x1="95" y1="20" x2="170" y2="130" stroke="#5a4510" stroke-width="3"/>
    <!-- Debris layer -->
    <path d="M 10 130 Q 30 110 50 115 Q 70 120 95 115 Q 120 110 140 115 Q 160 120 180 130" fill="none" stroke="#4a7c3f" stroke-width="6"/>
    <path d="M 10 130 Q 30 118 50 122 Q 70 126 95 122 Q 120 118 140 122 Q 160 126 180 130" fill="none" stroke="#6b9b5a" stroke-width="4"/>
    <!-- Person inside -->
    <ellipse cx="95" cy="100" rx="12" ry="7" fill="#888"/>
    <text x="95" y="150" text-anchor="middle" font-size="9" fill="#555">Para frío extremo</text>
    <text x="95" y="162" text-anchor="middle" font-size="8" fill="#8b949e">Mejor aislamiento térmico</text>
  </g>

  <!-- Lean-to -->
  <g transform="translate(290,50)">
    <rect x="-5" y="-5" width="200" height="160" fill="none" stroke="#ccc" stroke-width="1" rx="4"/>
    <text x="95" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">2. Lean-to (Techumbre)</text>
    <!-- Ground -->
    <line x1="10" y1="130" x2="180" y2="130" stroke="#8B6914" stroke-width="2"/>
    <!-- Single slope roof -->
    <line x1="95" y1="20" x2="170" y2="130" stroke="#5a4510" stroke-width="3"/>
    <line x1="95" y1="20" x2="20" y2="130" stroke="#5a4510" stroke-width="3"/>
    <!-- Covering -->
    <path d="M 20 130 L 95 20 L 170 130" fill="none" stroke="#4a7c3f" stroke-width="5"/>
    <text x="95" y="55" text-anchor="middle" font-size="9" fill="#3fb950">fuego aquí</text>
    <line x1="95" y1="60" x2="95" y2="125" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="95" y="150" text-anchor="middle" font-size="9" fill="#555">Para clima templado-seco</text>
    <text x="95" y="162" text-anchor="middle" font-size="8" fill="#8b949e">Calor radiante entra al refugio</text>
  </g>

  <!-- Tarp shelter -->
  <g transform="translate(530,50)">
    <rect x="-5" y="-5" width="220" height="160" fill="none" stroke="#ccc" stroke-width="1" rx="4"/>
    <text x="105" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">3. Tarp Shelter (Lona)</text>
    <!-- Tarp diamond -->
    <polygon points="105,25 180,90 105,130 30,90" fill="none" stroke="#888" stroke-width="2"/>
    <!-- Ridgeline -->
    <line x1="30" y1="90" x2="180" y2="90" stroke="#c9a227" stroke-width="2"/>
    <text x="105" y="82" text-anchor="middle" font-size="9" fill="#c9a227">ridge</text>
    <!-- Corner labels -->
    <circle cx="30" cy="90" r="3" fill="#2563eb"/>
    <circle cx="180" cy="90" r="3" fill="#2563eb"/>
    <circle cx="105" cy="25" r="3" fill="#f85149"/>
    <circle cx="105" cy="130" r="3" fill="#3fb950"/>
    <text x="15" y="82" font-size="8" fill="#2563eb">A</text>
    <text x="185" y="82" font-size="8" fill="#2563eb">B</text>
    <text x="105" y="18" font-size="8" fill="#f85149">C</text>
    <text x="105" y="143" font-size="8" fill="#3fb950">D</text>
    <text x="105" y="160" text-anchor="middle" font-size="9" fill="#555">A-B: ridge alta | C: alta | D: baja</text>
  </g>

  <!-- Snow shelter -->
  <g transform="translate(50,230)">
    <rect x="-5" y="-5" width="200" height="150" fill="none" stroke="#ccc" stroke-width="1" rx="4"/>
    <text x="95" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#0ea5e9">4. Snow Shelter (Quinche)</text>
    <!-- Snow mound -->
    <path d="M 20 130 Q 50 40 95 30 Q 140 40 170 130" fill="#ddeeff" stroke="#aaccff" stroke-width="2"/>
    <!-- Entrance tunnel -->
    <path d="M 80 130 Q 75 145 60 145 Q 50 145 50 135" fill="none" stroke="#aaccff" stroke-width="3"/>
    <text x="60" y="142" text-anchor="middle" font-size="8" fill="#aaccff">entrada</text>
    <!-- Interior person -->
    <ellipse cx="95" cy="90" rx="10" ry="6" fill="#888"/>
    <text x="95" y="110" text-anchor="middle" font-size="9" fill="#0ea5e9">aislado del viento</text>
    <text x="95" y="135" text-anchor="middle" font-size="8" fill="#8b949e">Solo en nieve compacta</text>
  </g>

  <!-- Key principles box -->
  <g transform="translate(290,230)">
    <rect x="-5" y="-5" width="480" height="150" fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="1.5" rx="8"/>
    <text x="235" y="0" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">PRINCIPIOS DE AISLAMIENTO</text>

    <g transform="translate(0,20)">
      <text x="0" y="0" font-size="11" font-weight="bold" fill="#1a1a2e">1. AISLAMIENTO DEL SUELO (el 50% del calor se escapa por abajo)</text>
      <text x="20" y="18" font-size="10" fill="#444">Ramas, hojas, pasto, nieve seca — mínimo 15cm de espesor</text>
      <text x="20" y="33" font-size="10" fill="#444">Un cuerpo sin aislamiento en el suelo pierde calor 3x más rápido</text>

      <text x="0" y="58" font-size="11" font-weight="bold" fill="#1a1a2e">2. EFECTO DE SAUNA INVERSO</text>
      <text x="20" y="76" font-size="10" fill="#444">Un refugio pequeño (para 1 persona) se calienta solo</text>
      <text x="20" y="91" font-size="10" fill="#444">El calor del cuerpo (300-500 BTU/h) queda atrapado</text>
      <text x="20" y="106" font-size="10" fill="#444">Pero: sin ventilación morirás por acumulación de CO2</text>

      <text x="0" y="126" font-size="10" font-weight="bold" fill="#f85149">CRÍTICO: ventilación de 2.5cm² por persona como mínimo</text>
    </g>
  </g>
</svg>
