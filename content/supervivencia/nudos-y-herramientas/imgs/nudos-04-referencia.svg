<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="sans-serif">
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">NUDOS DE TOPE Y QUICK-RELEASE — Stopper &amp; Escape Knots</text>

  <!-- Overhand Knot -->
  <g transform="translate(70,55)">
    <rect x="-5" y="-10" width="130" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="105" text-anchor="middle" font-size="11" fill="#555">13. Overhand (Simple)</text>
    <path d="M 10 50 L 35 50" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <path d="M 35 50 C 55 50 60 35 50 25 C 40 15 25 20 25 35 L 25 50" fill="none" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <path d="M 25 50 L 25 65 L 50 65" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <text x="50" y="90" font-size="9" fill="#c9a227">evita que se deshaga</text>
  </g>

  <!-- Stevedore Knot -->
  <g transform="translate(250,55)">
    <rect x="-5" y="-10" width="130" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="105" text-anchor="middle" font-size="11" fill="#555">14. Stevedore (Reforzado)</text>
    <path d="M 10 50 L 30 50" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <path d="M 30 50 C 50 50 55 35 45 25 C 35 15 20 20 20 35 L 20 50" fill="none" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <path d="M 20 50 L 20 65 L 35 65 L 35 50" fill="none" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <path d="M 35 50 L 50 50" stroke="#8B4513" stroke-width="5" stroke-linecap="round"/>
    <circle cx="27" cy="40" r="4" fill="#c9a227"/>
    <circle cx="27" cy="55" r="4" fill="#c9a227"/>
    <text x="55" y="90" font-size="9" fill="#c9a227">no se deshace solo</text>
  </g>

  <!-- Highwayman's Hitch -->
  <g transform="translate(430,55)">
    <rect x="-5" y="-10" width="150" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="70" y="105" text-anchor="middle" font-size="11" fill="#555">15. Highwayman's Hitch</text>
    <text x="70" y="120" text-anchor="middle" font-size="9" fill="#2563eb">(Quick-Release — un tirón para soltar)</text>
    <!-- Post -->
    <rect x="10" y="25" width="8" height="55" fill="#8B6914" rx="2"/>
    <!-- Rope wraps -->
    <path d="M 50 30 L 30 30 Q 20 30 20 40 L 20 50 Q 20 58 30 55 L 50 55" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Hitch loop -->
    <path d="M 50 55 L 50 35 Q 50 28 42 28 L 35 28" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Release arrow -->
    <path d="M 45 40 L 60 40" stroke="#f85149" stroke-width="2" marker-end="url(#redarrow)"/>
    <text x="55" y="48" font-size="9" fill="#f85149">TIRAR = soltar</text>
  </g>

  <!-- Verification checklist -->
  <g transform="translate(30,175)">
    <rect x="-5" y="-10" width="360" height="180" fill="none" stroke="#c9a227" stroke-width="1.5" rx="8"/>
    <text x="0" y="8" font-size="13" font-weight="bold" fill="#c9a227">CHECKLIST DE VERIFICACIÓN</text>
    <text x="0" y="30" font-size="11" fill="#1a1a2e">Antes de confiar en cualquier nudo:</text>
    <text x="0" y="50" font-size="11" fill="#444">✓ 1. Inspecciona visualmente el nudo terminado</text>
    <text x="0" y="68" font-size="11" fill="#444">✓ 2. Aplica carga gradual (no la máxima de golpe)</text>
    <text x="0" y="86" font-size="11" fill="#444">✓ 3. Verifica que las fibras/ropa no estén pellizcadas</text>
    <text x="0" y="104" font-size="11" fill="#444">✓ 4. Comprueba que puedes desatarlo (sin cortarlo)</text>
    <text x="0" y="122" font-size="11" fill="#444">✓ 5. Si no puedes deshacerlo bajo carga, vuelve a intentarlo</text>
    <text x="0" y="145" font-size="11" font-weight="bold" fill="#f85149">NUNCA ates nudos uno encima de otro</text>
    <text x="0" y="163" font-size="10" fill="#555">Si un nudo falla, toda la estructura puede colapsar.</text>
  </g>

  <!-- Quick reference table -->
  <g transform="translate(420,175)">
    <rect x="-5" y="-10" width="355" height="180" fill="none" stroke="#ccc" stroke-width="1" rx="8"/>
    <text x="0" y="8" font-size="13" font-weight="bold" fill="#1a1a2e">GUÍA RÁPIDA</text>
    <text x="0" y="30" font-size="10" fill="#444">Amarrar a poste → Clove Hitch o Taut-line</text>
    <text x="0" y="48" font-size="10" fill="#444">Juntar dos cuerdas → Sheet Bend (doble si mojadas)</text>
    <text x="0" y="66" font-size="10" fill="#444">Lazo que no se aprieta → Bowline</text>
    <text x="0" y="84" font-size="10" fill="#444">Loop en medio de cuerda → Alpine Butterfly</text>
    <text x="0" y="102" font-size="10" fill="#444">Ascender por cuerda → Prusik</text>
    <text x="0" y="120" font-size="10" fill="#444">Detener cuerda que pasa → Figure-8 o Overhand</text>
    <text x="0" y="138" font-size="10" fill="#444">Soltar rápido → Highwayman's Hitch</text>
    <text x="0" y="156" font-size="10" fill="#444">Arrastrar madera → Timber Hitch</text>
    <text x="0" y="170" font-size="9" fill="#c9a227">Corta extremos de cuerda 2-3cm del nudo si está muy apretado</text>
  </g>

  <defs>
    <marker id="redarrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#f85149"/>
    </marker>
  </defs>
</svg>
