<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
  <rect width="800" height="500" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">NUDOS DE AMARRE — Hitches</text>

  <!-- Clove Hitch -->
  <g transform="translate(100,70)">
    <rect x="-5" y="-10" width="120" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="55" y="100" text-anchor="middle" font-size="11" fill="#555">1. Clove Hitch</text>
    <!-- Post -->
    <rect x="25" y="10" width="12" height="80" fill="#8B6914" rx="3"/>
    <!-- Rope going around post -->
    <path d="M 10 35 Q 20 30 30 30 L 30 30 Q 42 30 42 40 L 42 50 Q 42 58 35 58 L 10 58" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <path d="M 10 58 L 10 58 Q 5 58 5 50 L 5 42 Q 5 35 15 35 L 37 35 Q 45 35 45 43 L 45 55" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Loop labels -->
    <circle cx="27" cy="35" r="4" fill="none" stroke="#c9a227" stroke-width="2"/>
    <text x="60" y="38" font-size="9" fill="#c9a227">vuelta</text>
  </g>

  <!-- Taut-line Hitch -->
  <g transform="translate(280,70)">
    <rect x="-5" y="-10" width="120" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="55" y="100" text-anchor="middle" font-size="11" fill="#555">2. Taut-line Hitch</text>
    <!-- Loop around pole -->
    <rect x="15" y="20" width="8" height="65" fill="#8B6914" rx="2"/>
    <!-- Rope -->
    <path d="M 50 25 C 40 25 30 30 28 40 L 28 55 C 26 65 35 70 45 68 L 60 65" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Working end wrapping -->
    <path d="M 45 68 L 45 55 L 28 50" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Arrow showing tension -->
    <path d="M 60 65 L 75 60" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="68" y="55" font-size="9" fill="#2563eb">ajusta</text>
  </g>

  <!-- Timber Hitch -->
  <g transform="translate(460,70)">
    <rect x="-5" y="-10" width="120" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="55" y="100" text-anchor="middle" font-size="11" fill="#555">3. Timber Hitch</text>
    <!-- Log -->
    <ellipse cx="55" cy="55" rx="40" ry="14" fill="#8B6914"/>
    <ellipse cx="55" cy="55" rx="40" ry="14" fill="none" stroke="#5a4510" stroke-width="1"/>
    <!-- Rope -->
    <path d="M 5 35 Q 20 50 55 55" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Wrapping around log -->
    <path d="M 55 55 Q 80 50 90 55 Q 80 60 55 55" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <!-- Pull arrow -->
    <path d="M 90 55 L 105 45" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="95" y="40" font-size="9" fill="#2563eb">tracción</text>
  </g>

  <!-- Killick Hitch -->
  <g transform="translate(640,70)">
    <rect x="-5" y="-10" width="120" height="100" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="55" y="100" text-anchor="middle" font-size="11" fill="#555">4. Killick Hitch</text>
    <!-- Stone -->
    <ellipse cx="55" cy="60" rx="25" ry="18" fill="#888" stroke="#555" stroke-width="1"/>
    <!-- Rope -->
    <path d="M 20 25 C 35 40 45 50 55 60" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <path d="M 55 60 C 60 50 70 45 80 45" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <path d="M 80 45 L 85 25" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <text x="62" y="40" font-size="9" fill="#c9a227">para levantar</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Notes section -->
  <text x="400" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">USO: Atar a postes, ajustar tensión, arrastrar madera, levantar piedras</text>

  <!-- Key properties -->
  <g transform="translate(30,220)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#1a1a2e">Propiedades de los nudos de amarre:</text>
    <text x="0" y="18" font-size="10" fill="#444">• Clove Hitch: se deshace tirando un extremo</text>
    <text x="0" y="33" font-size="10" fill="#444">• Taut-line: se desliza para ajustar, no se afloja solo</text>
    <text x="0" y="48" font-size="10" fill="#444">• Timber Hitch: resiste tracción longitudinal, no lateral</text>
    <text x="0" y="63" font-size="10" fill="#444">• Killick Hitch: para elevar piedras u objetos redondos</text>
  </g>
</svg>
