<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="sans-serif">
  <rect width="800" height="480" fill="#0a0a1a"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#e8c547">ORIENTACIÓN POR LAS ESTRELLAS — Hemisferio Sur</text>

  <!-- Southern Cross (Crux) detailed -->
  <g transform="translate(80,70)">
    <text x="90" y="0" text-anchor="middle" font-size="12" fill="#8b949e">Cruz del Sur (Crux)</text>

    <!-- Gacrux (top) -->
    <circle cx="90" cy="45" r="5" fill="#e8c547"/>
    <text x="90" y="38" text-anchor="middle" font-size="8" fill="#e8c547">Gacrux</text>

    <!-- Acrux (bottom) -->
    <circle cx="90" cy="115" r="5" fill="#e8c547"/>
    <text x="90" y="130" text-anchor="middle" font-size="8" fill="#e8c547">Acrux</text>

    <!-- Mimosa (left) -->
    <circle cx="45" cy="80" r="4" fill="#e8c547"/>
    <text x="28" y="83" text-anchor="end" font-size="8" fill="#8b949e">Mimosa</text>

    <!-- Imai (right) -->
    <circle cx="135" cy="80" r="4" fill="#e8c547"/>
    <text x="152" y="83" text-anchor="start" font-size="8" fill="#8b949e">Imai</text>

    <!-- Cross lines -->
    <line x1="90" y1="45" x2="90" y2="115" stroke="#e8c547" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="80" x2="135" y2="80" stroke="#e8c547" stroke-width="1" opacity="0.5"/>

    <!-- Extension line from Gacrux -->
    <line x1="90" y1="45" x2="90" y2="0" stroke="#c9a227" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="90" cy="0" r="3" fill="#c9a227"/>
    <text x="90" y="-8" text-anchor="middle" font-size="8" fill="#c9a227">Polo Sur Celeste</text>

    <!-- Arrow showing how to extend 4.5x -->
    <path d="M 75 45 Q 70 20 90 0" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="60" y="22" font-size="8" fill="#c9a227">4.5× distancia</text>
    <text x="60" y="33" font-size="8" fill="#c9a227">entre Gacrux-Acrux</text>
  </g>

  <!-- Pointer Stars and Canopus -->
  <g transform="translate(330,70)">
    <text x="120" y="0" text-anchor="middle" font-size="12" fill="#8b949e">Puntero Alfa y Beta Centauri + Canopo</text>

    <!-- Alpha Centauri -->
    <circle cx="20" cy="80" r="5" fill="#e8c547"/>
    <text x="20" y="70" text-anchor="middle" font-size="8" fill="#e8c547">Alfa Cen</text>

    <!-- Beta Centauri -->
    <circle cx="90" cy="30" r="4" fill="#e8c547"/>
    <text x="90" y="20" text-anchor="middle" font-size="8" fill="#e8c547">Beta Cen</text>

    <!-- Line between pointers -->
    <line x1="20" y1="80" x2="90" y2="30" stroke="#e8c547" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Perpendicular bisector (south direction) -->
    <line x1="55" y1="55" x2="0" y2="55" stroke="#c9a227" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="0" cy="55" r="3" fill="#c9a227"/>
    <text x="-5" y="68" text-anchor="middle" font-size="8" fill="#c9a227">SUR</text>

    <!-- Canopus (below) -->
    <circle cx="55" cy="150" r="4" fill="#c9a227"/>
    <text x="55" y="168" text-anchor="middle" font-size="8" fill="#c9a227">Canopo</text>
    <text x="55" y="180" text-anchor="middle" font-size="7" fill="#8b949e">(2° abajo desde polo sur)</text>

    <!-- Canopus method arrow -->
    <path d="M 55 150 L 55 130 L 55 55" stroke="#c9a227" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="70" y="100" font-size="7" fill="#8b949e">desde Canopo</text>
    <text x="70" y="110" font-size="7" fill="#8b949e">subir 2°</text>
  </g>

  <!-- Practical method box -->
  <g transform="translate(570,70)">
    <rect x="-10" y="-15" width="220" height="200" fill="none" stroke="#c9a227" stroke-width="1.5" rx="8"/>
    <text x="100" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#c9a227">MÉTODO PASO A PASO</text>

    <text x="0" y="22" font-size="10" fill="#e6edf3">1. Localiza la Cruz del Sur</text>
    <text x="0" y="40" font-size="10" fill="#e6edf3">2. Identifica Gacrux (arriba) y Acrux (abajo)</text>
    <text x="0" y="58" font-size="10" fill="#e6edf3">3. Mide 4.5× la distancia Gacrux→Acrux</text>
    <text x="0" y="76" font-size="10" fill="#e6edf3">4. Traza línea perpendicular hacia abajo</text>
    <text x="0" y="94" font-size="10" fill="#e6edf3">5. Ese punto = Polo Sur Celeste</text>
    <text x="0" y="112" font-size="10" fill="#e6edf3">6. Baja la vista al horizonte</text>
    <text x="0" y="130" font-size="10" font-weight="bold" fill="#c9a227">7. SUR geográfico ≈ ese punto</text>

    <text x="0" y="155" font-size="9" fill="#8b949e">Precisión: ±2-3° (suficiente para navegación)</text>
    <text x="0" y="170" font-size="9" fill="#8b949e">Con punteros: trazando perpendicular</text>
    <text x="0" y="182" font-size="9" fill="#8b949e">bisectriz entre Alfa y Beta Centauri</text>
  </g>

  <!-- Key point at bottom -->
  <g transform="translate(0,290)">
    <rect x="0" y="0" width="800" height="80" fill="rgba(201,162,39,0.1)" rx="0"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#c9a227">IMPORTANTE: El SUR geográfico está a ~3° del Polo Sur Celeste</text>
    <text x="400" y="42" font-size="10" fill="#8b949e">Para máxima precisión, combina Cruz del Sur + Punteros + Canopo</text>
    <text x="400" y="60" font-size="10" fill="#8b949e">En noches sin nubes, la Cruz del Sur es visible todo el año en el hemisferio sur</text>
  </g>

  <!-- Alternative: Orion (visible in both hemispheres) -->
  <g transform="translate(80,395)">
    <text x="120" y="0" text-anchor="middle" font-size="11" fill="#8b949e">ORIÓN (visible en ambos hemisferios) — para práctica</text>
    <!-- Orion belt -->
    <line x1="40" y1="30" x2="200" y2="30" stroke="#e8c547" stroke-width="2"/>
    <!-- Stars of Orion -->
    <circle cx="40" cy="30" r="3" fill="#e8c547"/><text x="40" y="22" text-anchor="middle" font-size="7" fill="#8b949e">Alnitak</text>
    <circle cx="120" cy="30" r="4" fill="#e8c547"/><text x="120" y="22" text-anchor="middle" font-size="7" fill="#8b949e">Alnilam</text>
    <circle cx="200" cy="30" r="3" fill="#e8c547"/><text x="200" y="22" text-anchor="middle" font-size="7" fill="#8b949e">Mintaka</text>
    <!-- Sword -->
    <circle cx="120" cy="55" r="2" fill="#e8c547"/>
    <circle cx="120" cy="65" r="2" fill="#e8c547"/>
    <circle cx="120" cy="75" r="2" fill="#e8c547"/>
    <text x="120" y="92" text-anchor="middle" font-size="7" fill="#8b949e">Cinturón = 3 estrellas alineadas</text>
    <text x="120" y="105" text-anchor="middle" font-size="7" fill="#8b949e">El que apunta al cinturón</text>
    <text x="120" y="117" text-anchor="middle" font-size="7" fill="#8b949e">indica el Ecuador</text>
  </g>
</svg>
