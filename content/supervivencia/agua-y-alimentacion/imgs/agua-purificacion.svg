<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="sans-serif">
  <rect width="800" height="440" fill="#fafafa"/>

  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">MÉTODOS DE PURIFICACIÓN DE AGUA — Eficacia y aplicabilidad</text>

  <!-- Column headers -->
  <g transform="translate(50,55)">
    <text x="80" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Método</text>
    <text x="80" y="14" text-anchor="middle" font-size="9" fill="#8b949e">Bacterias</text>
    <text x="80" y="26" text-anchor="middle" font-size="9" fill="#8b949e">Virus</text>
    <text x="80" y="38" text-anchor="middle" font-size="9" fill="#8b949e">Parásitos</text>
    <text x="80" y="50" text-anchor="middle" font-size="9" fill="#8b949e">Protozoos</text>

    <text x="175" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Hervor</text>
    <text x="175" y="20" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="175" y="36" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="175" y="50" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>

    <text x="250" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Yodo</text>
    <text x="250" y="20" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="250" y="36" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="250" y="50" text-anchor="middle" font-size="14" fill="#f85149">✗</text>

    <text x="325" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">UV/Sol</text>
    <text x="325" y="20" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="325" y="36" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="325" y="50" text-anchor="middle" font-size="14" fill="#f85149">✗</text>

    <text x="400" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Filtro</text>
    <text x="400" y="20" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
    <text x="400" y="36" text-anchor="middle" font-size="14" fill="#c9a227">±</text>
    <text x="400" y="50" text-anchor="middle" font-size="14" fill="#3fb950">✓</text>
  </g>

  <!-- Divider -->
  <line x1="50" y1="115" x2="750" y2="115" stroke="#ccc" stroke-width="1"/>

  <!-- SODIS method -->
  <g transform="translate(50,130)">
    <rect x="-5" y="-5" width="700" height="130" fill="rgba(14,165,233,0.05)" stroke="#0ea5e9" stroke-width="1.5" rx="8"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#0ea5e9">SODIS — Desinfección Solar (gratuita, sin equipamiento)</text>

    <g transform="translate(0,20)">
      <text x="0" y="0" font-size="10" fill="#333">1. Llenar botellas PET transparentes (o vidrio) con agua turbia/prefiltrada</text>
      <text x="0" y="18" font-size="10" fill="#333">2. Eliminar burbujas de aire (golpear suavemente)</text>
      <text x="0" y="36" font-size="10" fill="#333">3. Exponer al sol directo: 6h mínimo (día nublado: 2 días)</text>
      <text x="0" y="54" font-size="10" fill="#333">4. Trackes UV destruyen ADN de patógenos</text>
      <text x="0" y="75" font-size="10" fill="#c9a227">Limitación: NO elimina quistes de Cryptosporidium ni Giardia</text>
      <text x="0" y="92" font-size="10" fill="#f85149">NO sirve con agua turbia muy densa (sedimentos bloquean UV)</text>
    </g>
  </g>

  <!-- Filtration hierarchy -->
  <g transform="translate(50,280)">
    <rect x="-5" y="-5" width="700" height="145" fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="1.5" rx="8"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#2563eb">JERARQUÍA DE FILTRACIÓN — En campo sin equipo comercial</text>

    <!-- Filter layers diagram -->
    <g transform="translate(20,20)">
      <!-- Layer 1: Gravel -->
      <rect x="0" y="0" width="200" height="25" fill="#aaa" stroke="#888" stroke-width="1"/>
      <text x="100" y="17" text-anchor="middle" font-size="10" fill="white">Grava gruesa (2-5cm)</text>
      <!-- Layer 2: Sand -->
      <rect x="0" y="25" width="200" height="25" fill="#c9a227" stroke="#a08020" stroke-width="1"/>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="white">Arena (fina si hay)</text>
      <!-- Layer 3: Cloth -->
      <rect x="0" y="50" width="200" height="15" fill="#ddd" stroke="#bbb" stroke-width="1"/>
      <text x="100" y="62" text-anchor="middle" font-size="9" fill="#555">Tela/Camiseta</text>
      <!-- Layer 4: Charcoal -->
      <rect x="0" y="65" width="200" height="25" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
      <text x="100" y="82" text-anchor="middle" font-size="10" fill="white">Carbón (si hay)</text>
      <!-- Layer 5: Gravel fine -->
      <rect x="0" y="90" width="200" height="20" fill="#888" stroke="#666" stroke-width="1"/>
      <text x="100" y="105" text-anchor="middle" font-size="10" fill="white">Grava fina</text>

      <text x="100" y="125" text-anchor="middle" font-size="10" fill="#2563eb">Filtro lento casero</text>
      <text x="100" y="138" text-anchor="middle" font-size="9" fill="#8b949e">Eliminar sedimentos antes de hervir</text>
    </g>

    <!-- Arrow -->
    <path d="M 250 80 L 270 80" stroke="#2563eb" stroke-width="3" marker-end="url(#bluearrow)"/>

    <!-- Boil step -->
    <g transform="translate(285,40)">
      <rect x="0" y="0" width="180" height="80" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="2" rx="6"/>
      <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#f85149">HERVOR</text>
      <text x="90" y="42" text-anchor="middle" font-size="10" fill="#333">Filtra → Hervir 1 min</text>
      <text x="90" y="58" text-anchor="middle" font-size="10" fill="#333">2000m+: 3 minutos</text>
      <text x="90" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">= Agua SEGURA</text>
    </g>

    <!-- Iodine note -->
    <g transform="translate(490,40)">
      <rect x="0" y="0" width="200" height="80" fill="rgba(201,162,39,0.1)" stroke="#c9a227" stroke-width="2" rx="6"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#c9a227">YODO (si no hay fuego)</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#333">2-4 gotas de yodo 2%</text>
      <text x="100" y="58" text-anchor="middle" font-size="10" fill="#333">por cada litro de agua clara</text>
      <text x="100" y="74" text-anchor="middle" font-size="10" fill="#333">Esperar 30 minutos mínimo</text>
    </g>
  </g>

  <defs>
    <marker id="bluearrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
