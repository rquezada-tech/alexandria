<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="column" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="40%" stop-color="#e8c547"/>
      <stop offset="60%" stop-color="#f0d85e"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="lighthouse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f0d85e"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d85e" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#e8a820" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8a820" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#fff9e6"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Decorative outer ring (parchment feel) -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="165" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.2"/>

  <!-- ===== LIGHTHOUSE (Pharos of Alexandria) ===== -->
  <!-- Lighthouse glow behind -->
  <ellipse cx="200" cy="85" rx="50" ry="50" fill="url(#glow)"/>

  <!-- Lighthouse base platform -->
  <rect x="155" y="195" width="90" height="12" rx="2" fill="#c9a227"/>
  <rect x="160" y="205" width="80" height="5" rx="1" fill="#a07d1a"/>

  <!-- Lighthouse tower body (tapering) -->
  <polygon points="175,205 225,205 215,95 185,95" fill="url(#lighthouse)"/>

  <!-- Lighthouse tower details (vertical lines) -->
  <line x1="190" y1="205" x2="188" y2="95" stroke="#a07d1a" stroke-width="1.2" opacity="0.5"/>
  <line x1="200" y1="205" x2="200" y2="95" stroke="#a07d1a" stroke-width="1.2" opacity="0.5"/>
  <line x1="210" y1="205" x2="212" y2="95" stroke="#a07d1a" stroke-width="1.2" opacity="0.5"/>

  <!-- Lighthouse windows/arches -->
  <rect x="191" y="130" width="18" height="22" rx="9" fill="#1a1a2e" opacity="0.8"/>
  <rect x="193" y="160" width="14" height="18" rx="7" fill="#1a1a2e" opacity="0.8"/>

  <!-- Lighthouse top platform -->
  <rect x="178" y="87" width="44" height="10" rx="2" fill="#c9a227"/>
  <rect x="182" y="80" width="36" height="9" rx="1" fill="#e8c547"/>

  <!-- Lighthouse lantern (top glow area) -->
  <rect x="188" y="65" width="24" height="18" rx="4" fill="#f0d85e" opacity="0.9"/>

  <!-- Flames (triple flame for brightness) -->
  <ellipse cx="200" cy="58" rx="8" ry="12" fill="url(#flame)" filter="url(#glow-filter)"/>
  <ellipse cx="192" cy="62" rx="5" ry="9" fill="url(#flame)" opacity="0.7" filter="url(#glow-filter)"/>
  <ellipse cx="208" cy="62" rx="5" ry="9" fill="url(#flame)" opacity="0.7" filter="url(#glow-filter)"/>

  <!-- ===== SCROLLS at base ===== -->
  <!-- Left scroll -->
  <rect x="95" y="295" width="55" height="42" rx="4" fill="url(#scroll)"/>
  <rect x="92" y="295" width="8" height="42" rx="4" fill="#d4b896"/>
  <rect x="145" y="295" width="8" height="42" rx="4" fill="#d4b896"/>
  <!-- Scroll text lines -->
  <line x1="107" y1="308" x2="138" y2="308" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="107" y1="315" x2="138" y2="315" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="107" y1="322" x2="138" y2="322" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="107" y1="329" x2="125" y2="329" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>

  <!-- Right scroll -->
  <rect x="245" y="295" width="55" height="42" rx="4" fill="url(#scroll)"/>
  <rect x="242" y="295" width="8" height="42" rx="4" fill="#d4b896"/>
  <rect x="295" y="295" width="8" height="42" rx="4" fill="#d4b896"/>
  <!-- Scroll text lines -->
  <line x1="257" y1="308" x2="288" y2="308" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="257" y1="315" x2="288" y2="315" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="257" y1="322" x2="288" y2="322" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="257" y1="329" x2="275" y2="329" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>

  <!-- ===== CENTER open book ===== -->
  <rect x="160" y="285" width="80" height="52" rx="3" fill="#f5e6c8"/>
  <!-- Book spine -->
  <rect x="198" y="285" width="4" height="52" fill="#c9a227"/>
  <!-- Left page lines -->
  <line x1="168" y1="298" x2="192" y2="298" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="168" y1="305" x2="192" y2="305" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="168" y1="312" x2="192" y2="312" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="168" y1="319" x2="192" y2="319" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="168" y1="326" x2="185" y2="326" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <!-- Right page lines -->
  <line x1="206" y1="298" x2="230" y2="298" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="206" y1="305" x2="230" y2="305" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="206" y1="312" x2="230" y2="312" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="206" y1="319" x2="230" y2="319" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>
  <line x1="206" y1="326" x2="225" y2="326" stroke="#8b7355" stroke-width="1.2" opacity="0.5"/>

  <!-- ===== COLUMNS (Greek architectural elements flanking the lighthouse) ===== -->
  <!-- Left column -->
  <rect x="122" y="180" width="16" height="80" rx="3" fill="#c9a227"/>
  <rect x="118" y="175" width="24" height="8" rx="2" fill="#e8c547"/>
  <rect x="118" y="257" width="24" height="6" rx="2" fill="#e8c547"/>
  <!-- Column fluting -->
  <line x1="126" y1="183" x2="126" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="183" x2="130" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>
  <line x1="134" y1="183" x2="134" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>

  <!-- Right column -->
  <rect x="262" y="180" width="16" height="80" rx="3" fill="#c9a227"/>
  <rect x="258" y="175" width="24" height="8" rx="2" fill="#e8c547"/>
  <rect x="258" y="257" width="24" height="6" rx="2" fill="#e8c547"/>
  <!-- Column fluting -->
  <line x1="266" y1="183" x2="266" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>
  <line x1="270" y1="183" x2="270" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>
  <line x1="274" y1="183" x2="274" y2="257" stroke="#a07d1a" stroke-width="1" opacity="0.4"/>

  <!-- ===== OWL (symbol of wisdom, perched on the book) ===== -->
  <!-- Owl body -->
  <ellipse cx="200" cy="272" rx="13" ry="15" fill="#c9a227"/>
  <!-- Owl head -->
  <circle cx="200" cy="258" r="10" fill="#e8c547"/>
  <!-- Owl eyes (large and wise) -->
  <circle cx="195" cy="256" r="4" fill="#1a1a2e"/>
  <circle cx="205" cy="256" r="4" fill="#1a1a2e"/>
  <circle cx="195.5" cy="255.5" r="1.5" fill="#f0d85e"/>
  <circle cx="205.5" cy="255.5" r="1.5" fill="#f0d85e"/>
  <!-- Owl beak -->
  <polygon points="200,258 197,262 203,262" fill="#e8a820"/>
  <!-- Owl ear tufts -->
  <polygon points="193,250 190,243 196,248" fill="#c9a227"/>
  <polygon points="207,250 210,243 204,248" fill="#c9a227"/>
  <!-- Owl wings hint -->
  <ellipse cx="188" cy="270" rx="5" ry="8" fill="#c9a227"/>
  <ellipse cx="212" cy="270" rx="5" ry="8" fill="#c9a227"/>

  <!-- Stars scattered (constellation feel — wisdom in the stars) -->
  <circle cx="100" cy="100" r="2" fill="#f0d85e" opacity="0.8"/>
  <circle cx="300" cy="90" r="1.5" fill="#f0d85e" opacity="0.7"/>
  <circle cx="320" cy="150" r="2" fill="#f0d85e" opacity="0.6"/>
  <circle cx="80" cy="160" r="1.5" fill="#f0d85e" opacity="0.7"/>
  <circle cx="60" cy="220" r="2" fill="#f0d85e" opacity="0.5"/>
  <circle cx="340" cy="240" r="1.5" fill="#f0d85e" opacity="0.6"/>
  <circle cx="115" cy="280" r="1" fill="#f0d85e" opacity="0.4"/>
  <circle cx="285" cy="275" r="1" fill="#f0d85e" opacity="0.4"/>
</svg>
