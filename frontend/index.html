<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexandria — Biblioteca Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --gold: #c9a227;
      --gold-light: #e8c547;
      --gold-dim: #a07d1a;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --danger: #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo svg { width: 36px; height: 36px; }
    .logo-text {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold);
    }
    .logo-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .model-badge {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }
    .db-stats {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 60px);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      background: var(--surface);
    }
    .sidebar h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }
    .domain-list { list-style: none; }
    .domain-list li {
      margin-bottom: 0.3rem;
    }
    .domain-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .domain-btn:hover, .domain-btn.active {
      background: var(--surface2);
      color: var(--gold);
      border-color: var(--border);
    }
    .domain-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold-dim);
    }
    .domain-btn.active .domain-dot { background: var(--gold); }

    /* ── Main ── */
    .main { display: flex; flex-direction: column; }

    /* ── Search ── */
    .search-area {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-btn {
      background: var(--gold);
      color: #0d1117;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .search-btn:hover { background: var(--gold-light); }

    /* ── Chat / Results ── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem 3rem;
      max-width: 820px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .welcome h2 {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }
    .welcome p { font-size: 0.9rem; max-width: 440px; margin: 0 auto; }

    /* ── Chat message ── */
    .chat-message { margin-bottom: 1.5rem; }
    .chat-message.user .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 2px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      max-width: 80%;
    }
    .chat-message.librarian .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px 12px 2px 12px;
      padding: 1rem 1.2rem;
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .msg-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      padding-left: 0.5rem;
    }
    .msg-sources {
      margin-top: 0.5rem;
      padding: 0.4rem 0.7rem;
      background: var(--surface2);
      border-left: 2px solid var(--gold-dim);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .msg-sources span { color: var(--gold); margin-right: 0.4rem; }

    /* ── Search results ── */
    .result-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.8rem;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .result-card:hover { border-color: var(--gold-dim); background: var(--surface2); }
    .result-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--gold-light);
      margin-bottom: 0.3rem;
    }
    .result-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .result-snippet { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Content viewer ── */
    .content-viewer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
    }
    .content-viewer h1 {
      font-family: 'Lora', serif;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }
    .content-viewer .content-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.2rem;
    }
    .content-viewer p { font-size: 0.88rem; line-height: 1.75; margin-bottom: 0.9rem; }
    .content-viewer h2 { font-size: 1rem; color: var(--gold-light); margin: 1.2rem 0 0.5rem; }
    .content-viewer ul { padding-left: 1.4rem; margin-bottom: 0.9rem; }
    .content-viewer li { font-size: 0.88rem; margin-bottom: 0.3rem; color: var(--text); }
    .close-btn {
      float: right;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .close-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 1rem 0;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--danger);
      border-radius: 6px;
      padding: 0.7rem 1rem;
      color: var(--danger);
      font-size: 0.85rem;
    }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .content-area { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="400" rx="80" fill="#0d1117"/>
      <ellipse cx="200" cy="85" rx="50" ry="50" fill="#f0d85e" opacity="0.2"/>
      <rect x="155" y="195" width="90" height="12" rx="2" fill="#c9a227"/>
      <polygon points="175,205 225,205 215,95 185,95" fill="#c9a227"/>
      <rect x="188" y="65" width="24" height="18" rx="4" fill="#f0d85e" opacity="0.9"/>
      <ellipse cx="200" cy="58" rx="8" ry="12" fill="#f7c948"/>
      <rect x="95" y="295" width="55" height="42" rx="4" fill="#f5e6c8"/>
      <rect x="245" y="295" width="55" height="42" rx="4" fill="#f5e6c8"/>
      <rect x="160" y="285" width="80" height="52" rx="3" fill="#f5e6c8"/>
      <ellipse cx="200" cy="272" rx="13" ry="15" fill="#c9a227"/>
    </svg>
    <div>
      <div class="logo-text">Alexandria</div>
      <div class="logo-sub">Biblioteca Offline</div>
    </div>
  </div>
  <div class="header-right">
    <span class="model-badge" id="model-badge">qwen3:14b</span>
    <span class="db-stats" id="db-stats">— artículos</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h3>Dominios</h3>
    <ul class="domain-list">
      <li>
        <button class="domain-btn active" onclick="setDomain(null)">
          <span class="domain-dot"></span> Todos
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('medicina')">
          <span class="domain-dot"></span> Medicina
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('supervivencia')">
          <span class="domain-dot"></span> Supervivencia
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('historia')">
          <span class="domain-dot"></span> Historia
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('electronica')">
          <span class="domain-dot"></span> Electrónica
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('manufactura')">
          <span class="domain-dot"></span> Manufactura
        </button>
      </li>
      <li>
        <button class="domain-btn" onclick="setDomain('comunicaciones')">
          <span class="domain-dot"></span> Comunicaciones
        </button>
      </li>
    </ul>
  </aside>

  <main class="main">
    <div class="search-area">
      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Pregunta sobre supervivencia, medicina o historia…"
          onkeydown="if(event.key==='Enter') doSearch()"
        />
        <button class="search-btn" onclick="doSearch()">Buscar</button>
      </div>
    </div>

    <div class="content-area" id="content-area">
      <div class="welcome">
        <h2>La memoria de la humanidad, preservada offline</h2>
        <p>Alexandria responde sobre supervivencia, medicina básica e historia usando conocimiento local verificable — sin Internet.</p>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:8080';
  let currentDomain = null;
  let currentContentId = null;

  async function loadStats() {
    try {
      const r = await fetch(`${API}/stats`);
      const d = await r.json();
      document.getElementById('db-stats').textContent =
        `${d.total_articles} artículos · ${d.total_chunks} chunks`;
    } catch { /* offline */ }
  }

  function setDomain(d) {
    currentDomain = d;
    document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
    if (d === null) {
      document.querySelector('.domain-btn').classList.add('active');
    } else {
      document.querySelectorAll('.domain-btn').forEach(b => {
        if (b.textContent.trim().toLowerCase().startsWith(d)) b.classList.add('active');
      });
    }
  }

  function renderWelcome() {
    document.getElementById('content-area').innerHTML = `
      <div class="welcome">
        <h2>La memoria de la humanidad, preservada offline</h2>
        <p>Alexandria responde sobre supervivencia, medicina básica e historia usando conocimiento local verificable — sin Internet.</p>
      </div>`;
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    const area = document.getElementById('content-area');
    area.innerHTML = `<div class="loading"><div class="spinner"></div>Buscando…</div>`;

    try {
      const url = `${API}/search?q=${encodeURIComponent(q)}${currentDomain ? `&domain=${currentDomain}` : ''}&limit=8`;
      const r = await fetch(url);
      const d = await r.json();

      if (!d.results.length) {
        area.innerHTML = `<div class="welcome"><h2>Sin resultados</h2><p>No encontré nada para "${q}". Prueba con otros términos.</p></div>`;
        return;
      }

      area.innerHTML = d.results.map(r => `
        <div class="result-card" onclick="viewContent(${r.id})">
          <div class="result-title">${r.title}</div>
          <div class="result-meta">${r.domain}${r.subtopic ? ' · ' + r.subtopic : ''}</div>
          <div class="result-snippet">${r.chunk.slice(0, 200)}…</div>
        </div>`).join('');
    } catch (e) {
      area.innerHTML = `<div class="error-msg">Error de conexión con la API. Asegúrate de que Alexandria esté corriendo.</div>`;
    }
  }

  async function viewContent(id) {
    const area = document.getElementById('content-area');
    area.innerHTML = `<div class="loading"><div class="spinner"></div>Cargando…</div>`;

    try {
      const r = await fetch(`${API}/content/${id}`);
      const d = await r.json();

      // Convert markdown-like to simple HTML paragraphs
      const paragraphs = d.full_text
        .split(/\n\n+/)
        .filter(p => p.trim())
        .map(p => {
          if (/^#{1,3}\s/.test(p)) {
            const level = p.match(/^(#{1,3})/)[1].length;
            const tag = `h${level + 1}`;
            const text = p.replace(/^#{1,3}\s+/, '');
            return `<${tag}>${text}</${tag}>`;
          }
          return `<p>${p}</p>`;
        }).join('\n');

      area.innerHTML = `
        <div class="content-viewer">
          <button class="close-btn" onclick="renderWelcome()">← Volver</button>
          <h1>${d.title}</h1>
          <div class="content-meta">${d.domain}${d.subtopic ? ' · ' + d.subtopic : ''} · ${d.chunks_count} sección${d.chunks_count > 1 ? 'es' : ''}</div>
          ${paragraphs}
        </div>`;
    } catch {
      area.innerHTML = `<div class="error-msg">No se pudo cargar el contenido.</div>`;
    }
  }

  async function doChat() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const area = document.getElementById('content-area');

    // User message
    area.innerHTML = `
      <div class="chat-message user"><div class="msg-bubble">${q}</div></div>
      <div class="chat-message librarian" id="assistant-msg">
        <div class="msg-bubble"><div class="loading"><div class="spinner"></div>El Bibliotecario responde…</div></div>
      </div>`;

    try {
      const r = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, domain: currentDomain, max_context: 5 }),
      });
      const d = await r.json();

      const sourcesHtml = d.sources && d.sources.length
        ? `<div class="msg-sources"><span>Fuentes:</span>${d.sources.map(s => s.title).join(', ')}</div>`
        : '';

      document.getElementById('assistant-msg').innerHTML = `
        <div class="msg-bubble">${d.answer}${sourcesHtml}</div>
        <div class="msg-meta">${d.model} · ${d.sources ? d.sources.length : 0} fuentes</div>`;
    } catch (e) {
      document.getElementById('assistant-msg').innerHTML =
        `<div class="error-msg">Error de conexión. ¿Está Ollama corriendo en localhost:11434?</div>`;
    }
  }

  // Enter = chat, Ctrl+Enter = search
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) doSearch();
  });

  loadStats();
</script>
</body>
</html>
