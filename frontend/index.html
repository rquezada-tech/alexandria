<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexandria — Biblioteca Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --gold: #c9a227;
      --gold-light: #e8c547;
      --gold-dim: #a07d1a;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --danger: #f85149;
      --success: #3fb950;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo svg { width: 36px; height: 36px; }
    .logo-text { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 600; color: var(--gold); }
    .logo-sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .model-badge { font-size: 0.75rem; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); padding: 0.2rem 0.6rem; border-radius: 20px; }
    .db-stats { font-size: 0.75rem; color: var(--text-muted); }
    .maps-btn {
      font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 0.2rem 0.7rem; border-radius: 20px; transition: all 0.15s;
    }
    .maps-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
    .ebooks-btn {
      font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 0.2rem 0.7rem; border-radius: 20px; transition: all 0.15s;
    }
    .ebooks-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 60px); }

    /* ── Sidebar ── */
    .sidebar { border-right: 1px solid var(--border); padding: 1.5rem 1rem; background: var(--surface); }
    .sidebar h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.8rem; }
    .domain-list { list-style: none; }
    .domain-list li { margin-bottom: 0.3rem; }
    .domain-btn {
      width: 100%; text-align: left; background: none; border: 1px solid transparent;
      color: var(--text-muted); padding: 0.4rem 0.7rem; border-radius: 6px;
      cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .domain-btn:hover, .domain-btn.active { background: var(--surface2); color: var(--gold); border-color: var(--border); }
    .domain-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-dim); }
    .domain-btn.active .domain-dot { background: var(--gold); }

    /* ── Main ── */
    .main { display: flex; flex-direction: column; }

    /* ── Search Area ── */
    .search-area { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); }
    .search-box { display: flex; gap: 0.5rem; align-items: center; }
    .search-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 0.6rem 1rem; border-radius: 8px;
      font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-btn {
      background: var(--gold); color: #0d1117; border: none;
      padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; transition: background 0.15s;
    }
    .search-btn:hover { background: var(--gold-light); }
    .mic-btn {
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
      padding: 0.6rem 0.8rem; border-radius: 8px; cursor: pointer;
      font-size: 1rem; transition: all 0.15s; display: flex; align-items: center;
    }
    .mic-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
    .mic-btn.recording { color: var(--danger); border-color: var(--danger); animation: pulse 1s ease-in-out infinite; }
    .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .speaker-btn {
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
      padding: 0.6rem 0.8rem; border-radius: 8px; cursor: pointer;
      font-size: 1rem; transition: all 0.15s; display: flex; align-items: center;
    }
    .speaker-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
    .speaker-btn.playing { color: var(--gold); border-color: var(--gold); animation: pulse 0.8s ease-in-out infinite; }
    .speaker-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .audio-status { font-size: 0.72rem; color: var(--text-muted); padding: 0.2rem 0; min-height: 1.2rem; }
    .audio-status .ok { color: var(--success); }
    .audio-status .warn { color: var(--gold); }

    /* ── Content Area ── */
    .content-area { flex: 1; overflow-y: auto; padding: 1.5rem 2rem 3rem; max-width: 820px; }

    /* ── Welcome ── */
    .welcome { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .welcome h2 { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 0.8rem; }
    .welcome p { font-size: 0.9rem; max-width: 440px; margin: 0 auto; }

    /* ── Chat Message ── */
    .chat-message { margin-bottom: 1.5rem; }
    .chat-message.user .msg-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px 12px 12px 2px; padding: 0.7rem 1rem;
      font-size: 0.9rem; max-width: 80%;
    }
    .chat-message.librarian .msg-bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px 12px 2px 12px; padding: 1rem 1.2rem;
      font-family: 'Lora', serif; font-size: 0.9rem; line-height: 1.7;
    }
    .msg-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .msg-role { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .msg-actions { margin-left: auto; display: flex; gap: 0.4rem; }
    .msg-action-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.72rem;
      transition: all 0.15s; display: flex; align-items: center; gap: 0.3rem;
    }
    .msg-action-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
    .msg-action-btn.speaking { color: var(--gold); border-color: var(--gold); }
    .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; padding-left: 0.5rem; }
    .msg-sources {
      margin-top: 0.5rem; padding: 0.4rem 0.7rem; background: var(--surface2);
      border-left: 2px solid var(--gold-dim); font-size: 0.75rem; color: var(--text-muted);
    }
    .msg-sources span { color: var(--gold); margin-right: 0.4rem; }

    /* ── Search Results ── */
    .result-card {
      border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.1rem;
      margin-bottom: 0.8rem; background: var(--surface); cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .result-card:hover { border-color: var(--gold-dim); background: var(--surface2); }
    .result-title { font-weight: 600; font-size: 0.9rem; color: var(--gold-light); margin-bottom: 0.3rem; }
    .result-meta { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .result-snippet { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Content Viewer ── */
    .content-viewer { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; }
    .content-viewer h1 { font-family: 'Lora', serif; color: var(--gold); margin-bottom: 0.4rem; }
    .content-viewer .content-meta { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.2rem; }
    .content-viewer p { font-size: 0.88rem; line-height: 1.75; margin-bottom: 0.9rem; }
    .content-viewer h2 { font-size: 1rem; color: var(--gold-light); margin: 1.2rem 0 0.5rem; }
    .content-viewer ul { padding-left: 1.4rem; margin-bottom: 0.9rem; }
    .content-viewer li { font-size: 0.88rem; margin-bottom: 0.3rem; color: var(--text); }
    .close-btn {
      float: right; background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.3rem 0.6rem; border-radius: 5px; cursor: pointer; font-size: 0.75rem;
    }
    .close-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Image Gallery ── */
    .article-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding: 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .article-gallery:empty { display: none; }
    .gallery-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 6px;
      cursor: zoom-in;
      border: 1px solid var(--border);
      transition: transform 0.15s, border-color 0.15s;
    }
    .gallery-img:hover { transform: scale(1.03); border-color: var(--gold-dim); }

    /* ── Figure / Figcaption ── */
    .content-viewer figure {
      margin: 1.2rem 0;
      text-align: center;
    }
    .content-viewer figure img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: zoom-in;
      transition: transform 0.15s;
    }
    .content-viewer figure img:hover { transform: scale(1.02); }
    .content-viewer figcaption {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.4rem;
      padding: 0 1rem;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      padding: 1rem;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 100%;
      max-height: 95vh;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    #lightbox-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
      font-style: italic;
      text-align: center;
      max-width: 600px;
      pointer-events: none;
    }
    #lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8);
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.2); }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; gap: 0.6rem; color: var(--text-muted); font-size: 0.85rem; padding: 1rem 0; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg { background: rgba(248,81,73,0.1); border: 1px solid var(--danger); border-radius: 6px; padding: 0.7rem 1rem; color: var(--danger); font-size: 0.85rem; }

    /* ── Audio Wave ── */
    .audio-wave {
      display: flex; align-items: center; gap: 2px; height: 20px; margin: 0.4rem 0;
    }
    .audio-wave span {
      width: 3px; background: var(--gold); border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite;
    }
    .audio-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .audio-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .audio-wave span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .audio-wave span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
    .audio-wave span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
    @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .content-area { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="400" rx="80" fill="#0d1117"/>
      <ellipse cx="200" cy="85" rx="50" ry="50" fill="#f0d85e" opacity="0.2"/>
      <rect x="155" y="195" width="90" height="12" rx="2" fill="#c9a227"/>
      <polygon points="175,205 225,205 215,95 185,95" fill="#c9a227"/>
      <rect x="188" y="65" width="24" height="18" rx="4" fill="#f0e85e" opacity="0.9"/>
      <ellipse cx="200" cy="58" rx="8" ry="12" fill="#f7c948"/>
      <rect x="95" y="295" width="55" height="42" rx="4" fill="#f5e6c8"/>
      <rect x="245" y="295" width="55" height="42" rx="4" fill="#f5e6c8"/>
      <rect x="160" y="285" width="80" height="52" rx="3" fill="#f5e6c8"/>
      <ellipse cx="200" cy="272" rx="13" ry="15" fill="#c9a227"/>
    </svg>
    <div>
      <div class="logo-text">Alexandria</div>
      <div class="logo-sub">Biblioteca Offline</div>
    </div>
  </div>
  <div class="header-right">
    <a href="/maps" class="maps-btn" id="maps-btn" title="Mapas offline" style="display:none">
      🗺️ Mapas
    </a>
    <a href="/ebooks" class="ebooks-btn" id="ebooks-btn" title="Ebooks" style="display:none">
      📚 Ebooks
    </a>
    <span class="model-badge" id="model-badge">—</span>
    <span class="db-stats" id="db-stats">— artículos</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h3>Dominios</h3>
    <ul class="domain-list">
      <li><button class="domain-btn active" onclick="setDomain(null)"><span class="domain-dot"></span> Todos</button></li>
      <li><button class="domain-btn" onclick="setDomain('medicina')"><span class="domain-dot"></span> Medicina</button></li>
      <li><button class="domain-btn" onclick="setDomain('supervivencia')"><span class="domain-dot"></span> Supervivencia</button></li>
      <li><button class="domain-btn" onclick="setDomain('historia')"><span class="domain-dot"></span> Historia</button></li>
      <li><button class="domain-btn" onclick="setDomain('electronica')"><span class="domain-dot"></span> Electrónica</button></li>
      <li><button class="domain-btn" onclick="setDomain('manufactura')"><span class="domain-dot"></span> Manufactura</button></li>
      <li><button class="domain-btn" onclick="setDomain('comunicaciones')"><span class="domain-dot"></span> Comunicaciones</button></li>
      <li><button class="domain-btn" onclick="setDomain('herramientas')"><span class="domain-dot"></span> Herramientas</button></li>
    </ul>
  </aside>

  <main class="main">
    <div class="search-area">
      <div class="search-box">
        <input type="text" class="search-input" id="search-input"
          placeholder="Pregunta sobre supervivencia, medicina o historia…"
          onkeydown="if(event.key==='Enter') doChat()" />
        <button class="mic-btn" id="mic-btn" title="Grabar voz" onclick="toggleRecording()">🎤</button>
        <button class="search-btn" onclick="doChat()">Preguntar</button>
      </div>
      <div class="audio-status" id="audio-status"></div>
    </div>

    <div class="content-area" id="content-area">
      <div class="welcome">
        <h2>La memoria de la humanidad, preservada offline</h2>
        <p>Alexandria responde sobre supervivencia, medicina básica e historia usando conocimiento local verificable — sin Internet.</p>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:8080';
  let currentDomain = null;
  let currentAudio = null;

  // ── Audio state ────────────────────────────────────────
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let audioContext = null;

  async function loadStats() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.getElementById('model-badge').textContent = d.audio?.stt_available ? '🎤 + 🔊' : '🔇';
      updateAudioStatus(d.audio);
    } catch { /* offline */ }

    try {
      const r = await fetch(`${API}/stats`);
      const d = await r.json();
      document.getElementById('db-stats').textContent = `${d.total_articles} artículos · ${d.total_chunks} chunks`;
    } catch { /* offline */ }

    // Check available maps
    try {
      const r = await fetch(`${API}/maps/available`);
      const d = await r.json();
      const downloaded = (d.maps || []).filter(m => m.status === 'available');
      const mapsBtn = document.getElementById('maps-btn');
      if (downloaded.length > 0) {
        mapsBtn.style.display = '';
        mapsBtn.textContent = `🗺️ Mapas (${downloaded.length})`;
      }
    } catch { /* maps no disponibles */ }

    // Check available ebooks
    try {
      const r = await fetch(`${API}/ebooks/list`);
      const d = await r.json();
      const books = d.ebooks || [];
      const ebooksBtn = document.getElementById('ebooks-btn');
      if (books.length > 0) {
        ebooksBtn.style.display = '';
        const totalChapters = books.reduce((s, b) => s + b.chapters.length, 0);
        ebooksBtn.textContent = `📚 Ebooks (${totalChapters} capítulos)`;
      }
    } catch { /* ebooks no disponibles */ }
  }

  function updateAudioStatus(audio) {
    const el = document.getElementById('audio-status');
    if (!audio) {
      el.innerHTML = '<span class="warn">Sin capacidades de audio</span>';
      return;
    }
    const parts = [];
    if (audio.stt_available) {
      parts.push('<span class="ok">STT: Whisper (' + audio.whisper_model + ')</span>');
    } else {
      parts.push('<span class="warn">STT: Whisper no instalado</span>');
    }
    if (audio.tts_available) {
      parts.push('<span class="ok">TTS: mlx-audio</span>');
    } else {
      parts.push('<span class="warn">TTS: mlx-audio no instalado</span>');
    }
    el.innerHTML = parts.join(' · ');
  }

  // ── Voice recording ────────────────────────────────────
  async function toggleRecording() {
    const btn = document.getElementById('mic-btn');
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          if (audioChunks.length === 0) return;

          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          btn.classList.remove('recording');
          btn.textContent = '🎤';
          isRecording = false;

          // Transcribe
          const area = document.getElementById('content-area');
          area.innerHTML = `
            <div class="chat-message user"><div class="msg-bubble">🎤 <em>Transcribiendo...</em></div></div>
            <div class="chat-message librarian"><div class="msg-bubble"><div class="loading"><div class="spinner"></div>Procesando tu voz…</div></div></div>`;

          try {
            const formData = new FormData();
            formData.append('audio', blob, 'voice.webm');
            formData.append('language', 'es');

            const r = await fetch(`${API}/audio/stt`, { method: 'POST', body: formData });
            if (!r.ok) {
              const err = await r.json();
              throw new Error(err.detail || 'STT falló');
            }
            const d = await r.json();
            document.getElementById('search-input').value = d.text;
            doChat();
          } catch (e) {
            area.innerHTML = `<div class="error-msg">Error STT: ${e.message}</div>`;
          }
        };

        mediaRecorder.start();
        isRecording = true;
        btn.classList.add('recording');
        btn.textContent = '⏹';
      } catch (e) {
        alert('No se pudo acceder al micrófono: ' + e.message);
      }
    } else {
      mediaRecorder?.stop();
    }
  }

  // ── TTS playback ───────────────────────────────────────
  async function speakText(text, btn) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
      document.querySelectorAll('.speaker-btn').forEach(b => b.classList.remove('playing'));
      return;
    }

    try {
      btn.classList.add('playing');
      btn.textContent = '⏸';

      const r = await fetch(`${API}/audio/tts?q=${encodeURIComponent(text)}`);
      if (!r.ok) throw new Error('TTS falló');

      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);

      currentAudio.onended = () => {
        currentAudio = null;
        btn.classList.remove('playing');
        btn.textContent = '🔊';
        URL.revokeObjectURL(url);
      };
      currentAudio.onerror = () => {
        currentAudio = null;
        btn.classList.remove('playing');
        btn.textContent = '🔊';
        alert('Error al reproducir audio.');
      };

      await currentAudio.play();
    } catch (e) {
      btn.classList.remove('playing');
      btn.textContent = '🔊';
      alert('TTS no disponible: ' + e.message);
    }
  }

  // ── Domain filter ──────────────────────────────────────
  function setDomain(d) {
    currentDomain = d;
    document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
    if (d === null) {
      document.querySelector('.domain-btn').classList.add('active');
    } else {
      document.querySelectorAll('.domain-btn').forEach(b => {
        if (b.textContent.trim().toLowerCase().startsWith(d)) b.classList.add('active');
      });
    }
  }

  function renderWelcome() {
    document.getElementById('content-area').innerHTML = `
      <div class="welcome">
        <h2>La memoria de la humanidad, preservada offline</h2>
        <p>Alexandria responde sobre supervivencia, medicina básica e historia usando conocimiento local verificable — sin Internet.</p>
      </div>`;
  }

  // ── Search ─────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const area = document.getElementById('content-area');
    area.innerHTML = `<div class="loading"><div class="spinner"></div>Buscando…</div>`;

    try {
      const url = `${API}/search?q=${encodeURIComponent(q)}${currentDomain ? `&domain=${currentDomain}` : ''}&limit=8`;
      const r = await fetch(url);
      const d = await r.json();
      if (!d.results.length) {
        area.innerHTML = `<div class="welcome"><h2>Sin resultados</h2><p>No encontré nada para "${q}". Prueba con otros términos.</p></div>`;
        return;
      }
      area.innerHTML = d.results.map(r => `
        <div class="result-card" onclick="viewContent(${r.id})">
          <div class="result-title">${r.title}</div>
          <div class="result-meta">${r.domain}${r.subtopic ? ' · ' + r.subtopic : ''}</div>
          <div class="result-snippet">${r.chunk.slice(0, 200)}…</div>
        </div>`).join('');
    } catch {
      area.innerHTML = `<div class="error-msg">Error de conexión con la API.</div>`;
    }
  }

  async function viewContent(id) {
    const area = document.getElementById('content-area');
    area.innerHTML = `<div class="loading"><div class="spinner"></div>Cargando…</div>`;

    try {
      const [contentRes, imagesRes] = await Promise.all([
        fetch(`${API}/content/${id}`),
        fetch(`${API}/content/${id}/images`),
      ]);

      const d = await contentRes.json();
      const imgData = await imagesRes.json();
      const images = imgData.images || [];

      // Render gallery if article has images
      const galleryHtml = images.length > 0
        ? `<div class="article-gallery">${images.map(img =>
            `<img class="gallery-img" src="${img.url}" alt="${img.alt}" title="${img.alt}"
               onclick="openLightbox('${img.url}', '${img.alt.replace(/'/g, "&#39;")}')" />`
          ).join('')}</div>`
        : '';

      // Parse full text and render with inline images
      const rendered = renderMarkdownWithImages(d.full_text, images);

      area.innerHTML = `
        <div class="content-viewer">
          <button class="close-btn" onclick="renderWelcome()">← Volver</button>
          <h1>${d.title}</h1>
          <div class="content-meta">${d.domain}${d.subtopic ? ' · ' + d.subtopic : ''} · ${d.chunks_count} sección${d.chunks_count > 1 ? 'es' : ''} · ${images.length} imagen${images.length !== 1 ? 'es' : ''}</div>
          ${galleryHtml}
          ${rendered}
        </div>`;
    } catch (e) {
      area.innerHTML = `<div class="error-msg">No se pudo cargar el contenido: ${e.message}</div>`;
    }
  }

  function renderMarkdownWithImages(text, images) {
    // Build image map by filename
    const imgByName = {};
    images.forEach(img => {
      imgByName[img.filename] = img;
    });

    // Split text into blocks
    const blocks = text.split(/\n\n+/);

    return blocks
      .map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';

        // Heading
        if (/^#{1,3}\s/.test(trimmed)) {
          const level = trimmed.match(/^(#{1,3})/)[1].length;
          const tag = `h${level + 1}`;
          const content = trimmed.replace(/^#{1,3}\s+/, '')
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*]+)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
          return `<${tag}>${content}</${tag}>`;
        }

        // Inline image: ![alt](image_path)
        if (/^!\[.*\]\(/.test(trimmed)) {
          // Extract image refs from text
          const imgRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
          let match;
          let processedBlock = trimmed;
          const imgRefs = [];

          while ((match = imgRegex.exec(trimmed)) !== null) {
            imgRefs.push({ alt: match[1], path: match[2] });
          }

          // Try to match images
          const figureHtml = imgRefs.map(ref => {
            const img = images.find(i => i.url.endsWith(ref.path) || i.filename === ref.path || ref.path.endsWith(i.filename));
            if (img) {
              const caption = ref.alt && ref.alt !== img.filename
                ? ref.alt
                : img.alt;
              return `<figure><img src="${img.url}" alt="${caption}" onclick="openLightbox('${img.url}', '${caption.replace(/'/g, "&#39;")}')" />${caption ? `<figcaption>${caption}</figcaption>` : ''}</figure>`;
            } else {
              // Image URL from content
              return `<figure><img src="/content-images/${ref.path}" alt="${ref.alt}" onclick="openLightbox('/content-images/${ref.path}', '${ref.alt.replace(/'/g, "&#39;")}')" />${ref.alt ? `<figcaption>${ref.alt}</figcaption>` : ''}</figure>`;
            }
          }).join('');

          if (figureHtml) return figureHtml;
        }

        // Regular paragraph — clean up markdown, preserve line breaks
        const cleaned = trimmed
          .replace(/^#{1,3}\s+/gm, '') // Remove headings (already handled)
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1')
          .replace(/^\- \-/gm, '-');

        return cleaned ? `<p>${cleaned}</p>` : '';
      })
      .filter(Boolean)
      .join('\n');
  }

  function openLightbox(url, caption) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox-caption').textContent = caption || '';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    document.body.style.overflow = '';
    // Clear src after transition
    setTimeout(() => { document.getElementById('lightbox-img').src = ''; }, 300);
  }

  // Close lightbox on Escape key
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Chat ───────────────────────────────────────────────
  async function doChat() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const area = document.getElementById('content-area');

    area.innerHTML = `
      <div class="chat-message user"><div class="msg-bubble">${escapeHtml(q)}</div></div>
      <div class="chat-message librarian" id="assistant-msg">
        <div class="msg-header"><span class="msg-role">El Bibliotecario</span></div>
        <div class="msg-bubble"><div class="loading"><div class="spinner"></div>Pensando…</div></div>
      </div>`;

    try {
      const r = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, domain: currentDomain, max_context: 5 }),
      });
      const d = await r.json();

      const sourcesHtml = d.sources && d.sources.length
        ? `<div class="msg-sources"><span>Fuentes:</span>${d.sources.map(s => s.title).join(', ')}</div>`
        : '';

      document.getElementById('assistant-msg').innerHTML = `
        <div class="msg-header">
          <span class="msg-role">El Bibliotecario</span>
          <div class="msg-actions">
            <button class="msg-action-btn" title="Escuchar respuesta" onclick="speakText(${JSON.stringify(d.answer).replace(/"/g, '&quot;')}, this)">🔊</button>
          </div>
        </div>
        <div class="msg-bubble">${d.answer}${sourcesHtml}</div>
        <div class="msg-meta">${d.model} · ${d.sources ? d.sources.length : 0} fuentes</div>`;
    } catch (e) {
      document.getElementById('assistant-msg').innerHTML =
        `<div class="error-msg">Error de conexión. ¿Está Alexandria corriendo en localhost:8080?</div>`;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ── Init ───────────────────────────────────────────────
  loadStats();
</script>

  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-caption"></div>
</div>
